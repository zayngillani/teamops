databases:

  - name: time_tracker

    databaseName: time_tracker

    user: root



services:

  - type: web

    name: time_tracker

    env: ruby

    buildCommand: "./bin/render-build.sh"

    startCommand: "bundle exec rails server"

    plan: free

    envVars:

      - key: DATABASE_URL

        fromDatabase:

          name: time_tracker

          property: connectionString

      - key: SECRET_KEY_BASE

        generateValue: true